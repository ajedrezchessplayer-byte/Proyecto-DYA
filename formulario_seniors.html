<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYA Mayores - Reporte Solidario</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            padding: 20px; 
            max-width: 1000px; 
            margin: auto; 
            background-color: #eef9f0; 
            color: #222;
            font-size: 1.2em; 
        }
        h2 { color: #e60000; text-align: center; font-size: 1.8em; margin-top: 10px; }
        .subtitulo { text-align: center; margin-bottom: 30px; color: #444; font-weight: 500; }
        
        .controles-superiores {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        .btn-interfaz {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        #formulario-dya {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            border: 2px solid #28a745;
        }
        .campo { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #111; }
        
        select, textarea, input { 
            width: 100%; padding: 15px; border: 2px solid #ccc; 
            border-radius: 10px; box-sizing: border-box; font-size: 1.1rem;
        }
        
        button#btn-enviar { 
            background-color: #e60000; color: white; border: none; 
            padding: 22px; width: 100%; font-size: 1.4em; font-weight: bold; 
            border-radius: 12px; cursor: pointer; margin-top: 20px;
            transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        button#btn-enviar:hover { background-color: #c40000; }
        
        .btn-gps { background-color: #28a745; margin-top: 15px; padding: 15px; font-size: 1em; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; }
        
        .aviso-legal { 
            font-size: 0.8em; color: #666; margin-top: 25px; line-height: 1.5; 
            text-align: center; background: #f9f9f9; padding: 15px; border-radius: 10px;
        }

        @media (min-width: 768px) {
            .contenedor-flexible { display: flex; gap: 40px; }
            .columna-izq, .columna-der { flex: 1; }
        }
        #map { height: 400px; border-radius: 15px; border: 3px solid #eee; z-index: 1; }

        .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Estilo para la vista previa de la foto */
        #vista-previa {
            display: none;
            width: 100%;
            margin-top: 15px;
            border-radius: 12px;
            border: 2px solid #28a745;
        }
    </style>
</head>
<body>

    <div class="controles-superiores">
        <button type="button" id="btn-lang" class="btn-interfaz">🇬🇧 English</button>
    </div>

    <h2 id="txt-titulo">Aviso Ciudadano a DYA</h2>
    <p class="subtitulo" id="txt-subtitulo">Su ayuda es muy importante para nosotros</p>

    <form id="formulario-dya">
        <div class="contenedor-flexible">
            <div class="columna-izq">
                <div class="campo">
                    <label id="lbl-ayuda" for="necesidad">¿Qué ayuda necesitan?</label>
                    <select id="necesidad" name="necesidad">
                        <option id="opt-comida" value="comida">Alimentos y bebida</option>
                        <option id="opt-abrigo" value="abrigo">Ropa o mantas</option>
                        <option id="opt-sanitario" value="sanitario">Atención de un médico</option>
                        <option id="opt-albergue" value="albergue">Llevar a un albergue</option>
                        <option id="opt-otro" value="otro">Otras necesidades</option>
                    </select>
                </div>

                <div class="campo">
                    <label id="lbl-urgencia" for="urgencia">¿Cómo de urgente es?</label>
                    <select id="urgencia" name="urgencia">
                        <option id="opt-baja" value="baja">Baja (Solo informar)</option>
                        <option id="opt-media" value="media">Media (Atención hoy)</option>
                        <option id="opt-alta" value="alta">Alta (Situación crítica)</option>
                    </select>
                </div>

                <div class="campo">
                    <label id="lbl-personas" for="num_personas">¿Cuántas personas son?</label>
                    <input type="number" id="num_personas" name="num_personas" min="1" max="10" value="1">
                </div>

                <div class="campo">
                    <label id="lbl-menores" for="menores">¿Se ven niños o menores?</label>
                    <select id="menores" name="menores">
                        <option id="opt-m-no" value="no">No se ven menores</option>
                        <option id="opt-m-si" value="si">Sí, hay niños presentes</option>
                        <option id="opt-m-duda" value="duda">No estoy seguro/a</option>
                    </select>
                </div>
            </div>

            <div class="columna-der">
                <div class="campo">
                    <label id="lbl-lugar">Indique el lugar (Toque el mapa):</label>
                    <div id="map"></div>
                    <button type="button" id="btn-gps-txt" class="btn-gps" onclick="usarGPS()">Usar mi ubicación actual</button>
                    <input type="hidden" id="latitud" name="latitud">
                    <input type="hidden" id="longitud" name="longitud">
                    <input type="hidden" id="ip_remota" name="ip_remota">
                    <input type="hidden" id="perfil" name="perfil" value="senior">
                </div>

                <div class="campo">
                    <label id="lbl-desc" for="descripcion">Descripción física:</label>
                    <textarea id="descripcion" name="descripcion" rows="3" placeholder="Hombre/Mujer, unos ... años, ropa clara/oscura..."></textarea>
                </div>

                <div class="campo">
                    <label id="lbl-foto">¿Quiere añadir una foto del lugar? (Opcional):</label>
                    <input type="file" id="input-foto" accept="image/*" capture="environment">
                    <img id="vista-previa" />
                    <input type="hidden" id="foto_base64" name="foto_base64">
                    <input type="hidden" id="foto_nombre" name="foto_nombre">
                </div>
            </div>
        </div>

        <div class="aviso-legal" id="txt-info">
            <b>Información:</b> Se guarda la dirección de internet (IP) del aviso por seguridad. Gracias por ayudar.
        </div>

        <button type="submit" id="btn-enviar">
            <span class="spinner" id="spinner"></span>
            <span id="btn-text">ENVIAR AVISO A DYA</span> 
        </button>
    </form>

    <script>
        // --- TRADUCCIONES ---
        let idiomaActual = 'es';
        const traducciones = {
            'en': {
                'titulo': 'Citizen Alert to DYA',
                'sub': 'Your help is very important to us',
                'ayu': 'What help is needed?',
                'urg': 'How urgent is it?',
                'per': 'How many people are there?',
                'men': 'Are any children visible?',
                'lug': 'Indicate the location (Tap the map):',
                'gps': 'Use my current location',
                'desc': 'Physical description:',
                'foto': 'Would you like to add a photo? (Optional):',
                'info': '<b>Information:</b> The IP address is stored for security purposes. Thank you for helping.',
                'env': 'SEND ALERT TO DYA',
                'enviando': 'Sending...',
                'exito': 'Sent successfully!',
                'error': 'Error sending.',
                'placeholder': 'Man/Woman, approx. ... years old, light/dark clothes...',
                'btnLang': '🇪🇸 Español',
                'o1': 'Food and drink', 'o2': 'Clothing or blankets', 'o3': 'Medical attention', 'o4': 'Take to a shelter', 'o5': 'Other needs',
                'u1': 'Low (Info only)', 'u2': 'Medium (Needs attention today)', 'u3': 'High (Critical situation)',
                'm1': 'No minors visible', 'm2': 'Yes, children present', 'm3': 'Not sure'
            },
            'es': {
                'titulo': 'Aviso Ciudadano a DYA',
                'sub': 'Su ayuda es muy importante para nosotros',
                'ayu': '¿Qué ayuda necesitan?',
                'urg': '¿Cómo de urgente es?',
                'per': '¿Cuántas personas son?',
                'men': '¿Se ven niños o menores?',
                'lug': 'Indique el lugar (Toque el mapa):',
                'gps': 'Usar mi ubicación actual',
                'desc': 'Descripción física:',
                'foto': '¿Quiere añadir una foto del lugar? (Opcional):',
                'info': '<b>Información:</b> Se guarda la dirección de internet (IP) del aviso por seguridad. Gracias por ayudar.',
                'env': 'ENVIAR AVISO A DYA',
                'enviando': 'Enviando...',
                'exito': '¡Enviado con éxito!',
                'error': 'Error al enviar.',
                'placeholder': 'Hombre/Mujer, unos ... años, ropa clara/oscura...',
                'btnLang': '🇬🇧 English',
                'o1': 'Alimentos y bebida', 'o2': 'Ropa o mantas', 'o3': 'Atención de un médico', 'o4': 'Llevar a un albergue', 'o5': 'Otras necesidades',
                'u1': 'Baja (Solo informar)', 'u2': 'Media (Atención hoy)', 'u3': 'Alta (Situación crítica)',
                'm1': 'No se ven menores', 'm2': 'Sí, hay niños presentes', 'm3': 'No estoy seguro/a'
            }
        };

        const btnLang = document.getElementById('btn-lang');
        btnLang.addEventListener('click', () => {
            idiomaActual = idiomaActual === 'es' ? 'en' : 'es';
            const t = traducciones[idiomaActual];
            
            document.getElementById('txt-titulo').innerText = t.titulo;
            document.getElementById('txt-subtitulo').innerText = t.sub;
            document.getElementById('lbl-ayuda').innerText = t.ayu;
            document.getElementById('lbl-urgencia').innerText = t.urg;
            document.getElementById('lbl-personas').innerText = t.per;
            document.getElementById('lbl-menores').innerText = t.men;
            document.getElementById('lbl-lugar').innerText = t.lug;
            document.getElementById('btn-gps-txt').innerText = t.gps;
            document.getElementById('lbl-desc').innerText = t.desc;
            document.getElementById('lbl-foto').innerText = t.foto;
            document.getElementById('descripcion').placeholder = t.placeholder;
            document.getElementById('txt-info').innerHTML = t.info;
            document.getElementById('btn-text').innerText = t.env;
            btnLang.innerText = t.btnLang;

            document.getElementById('opt-comida').innerText = t.o1;
            document.getElementById('opt-abrigo').innerText = t.o2;
            document.getElementById('opt-sanitario').innerText = t.o3;
            document.getElementById('opt-albergue').innerText = t.o4;
            document.getElementById('opt-otro').innerText = t.o5;
            document.getElementById('opt-baja').innerText = t.u1;
            document.getElementById('opt-media').innerText = t.u2;
            document.getElementById('opt-alta').innerText = t.u3;
            document.getElementById('opt-m-no').innerText = t.m1;
            document.getElementById('opt-m-si').innerText = t.m2;
            document.getElementById('opt-m-duda').innerText = t.m3;
        });

        // --- LÓGICA MAPA E IP ---
        fetch('https://api.ipify.org?format=json').then(res => res.json()).then(data => { document.getElementById('ip_remota').value = data.ip; });

        var map = L.map('map').setView([39.476, -6.372], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([39.476, -6.372], {draggable: true}).addTo(map);
        function actualizarCoordenadas(lat, lng) {
            document.getElementById('latitud').value = lat.toFixed(6);
            document.getElementById('longitud').value = lng.toFixed(6);
        }
        actualizarCoordenadas(39.476, -6.372);
        map.on('click', function(e) { marker.setLatLng(e.latlng); actualizarCoordenadas(e.latlng.lat, e.latlng.lng); });

        function usarGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(p) {
                    var lat = p.coords.latitude, lng = p.coords.longitude;
                    marker.setLatLng([lat, lng]); map.setView([lat, lng], 17); actualizarCoordenadas(lat, lng);
                });
            }
        }

        // --- LÓGICA DE LA FOTO (COMPRESIÓN) ---
        const inputFoto = document.getElementById('input-foto');
        const vistaPrevia = document.getElementById('vista-previa');
        const fotoBase64 = document.getElementById('foto_base64');
        const fotoNombre = document.getElementById('foto_nombre');

        inputFoto.addEventListener('change', function() {
            const fichero = this.files[0];
            if (fichero) {
                const lector = new FileReader();
                lector.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        vistaPrevia.src = dataUrl;
                        vistaPrevia.style.display = 'block';
                        
                        fotoBase64.value = dataUrl.split(',')[1];
                        fotoNombre.value = "DYA_MAYORES_" + Date.now() + ".jpg";
                    };
                };
                lector.readAsDataURL(fichero);
            }
        });

        // --- ENVÍO ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw-VaLvx7XzqAG5ZHdAADQCaoy5xNA4T_Lpen3ncg2Zek5yC4lda1Gg7_VtACEw0v4p/exec';
        const form = document.getElementById('formulario-dya');
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btnEnviar = document.getElementById('btn-enviar'), spinner = document.getElementById('spinner'), btnText = document.getElementById('btn-text');
            btnEnviar.disabled = true; spinner.style.display = "inline-block"; btnText.innerText = traducciones[idiomaActual].enviando;

            fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors'})
                .then(() => {
                    alert(traducciones[idiomaActual].exito);
                    form.reset();
                    vistaPrevia.style.display = 'none';
                    fotoBase64.value = '';
                    window.location.href = "index.html";
                })
                .catch(() => {
                    alert(traducciones[idiomaActual].error);
                    btnEnviar.disabled = false; spinner.style.display = "none"; btnText.innerText = traducciones[idiomaActual].env;
                });
        });
    </script>
</body>
</html>
