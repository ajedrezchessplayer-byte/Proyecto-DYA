
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYA Mayores - Reporte Solidario</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            padding: 20px; 
            max-width: 1000px; 
            margin: auto; 
            background-color: #eef9f0; /* Fondo verde suave para mayores */
            color: #222;
            font-size: 1.2em; /* Letra más grande de base */
        }
        h2 { color: #e60000; text-align: center; font-size: 1.8em; }
        .subtitulo { text-align: center; margin-bottom: 30px; color: #444; font-weight: 500; }
        
        #formulario-dya {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            border: 2px solid #28a745;
        }
        .campo { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #111; }
        
        select, textarea, input { 
            width: 100%; 
            padding: 15px; /* Más espacio para pulsar mejor */
            border: 2px solid #ccc; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1.1rem;
        }
        
        button { 
            background-color: #e60000; 
            color: white; 
            border: none; 
            padding: 22px; 
            width: 100%; 
            font-size: 1.4em; 
            font-weight: bold; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background-color: #c40000; }
        
        .btn-gps { 
            background-color: #28a745; 
            margin-top: 15px; 
            padding: 15px; 
            font-size: 1em; 
        }
        
        .aviso-legal { 
            font-size: 0.8em; 
            color: #666; 
            margin-top: 25px; 
            line-height: 1.5; 
            text-align: center;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
        }

        @media (min-width: 768px) {
            .contenedor-flexible { display: flex; gap: 40px; }
            .columna-izq, .columna-der { flex: 1; }
        }
        #map { height: 400px; border-radius: 15px; border: 3px solid #eee; z-index: 1; }
    </style>
</head>
<body>

    <h2>Aviso Ciudadano a DYA</h2>
    <p class="subtitulo">Su ayuda es muy importante para nosotros</p>

    <form id="formulario-dya">
        <div class="contenedor-flexible">
            <div class="columna-izq">
                <div class="campo">
                    <label for="necesidad">¿Qué ayuda necesitan?</label>
                    <select id="necesidad" name="necesidad">
                        <option value="comida">Alimentos y bebida</option>
                        <option value="abrigo">Ropa o mantas</option>
                        <option value="sanitario">Atención de un médico</option>
                        <option value="albergue">Llevar a un albergue</option>
                        <option value="otro">Otras necesidades</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="urgencia">¿Cómo de urgente es?</label>
                    <select id="urgencia" name="urgencia">
                        <option value="baja">Baja (Solo informar)</option>
                        <option value="media">Media (Atención hoy)</option>
                        <option value="alta">Alta (Situación crítica)</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="num_personas">¿Cuántas personas son?</label>
                    <input type="number" id="num_personas" name="num_personas" min="1" max="10" value="1">
                </div>

                <div class="campo">
                    <label for="menores">¿Se ven niños o menores?</label>
                    <select id="menores" name="menores">
                        <option value="no">No se ven menores</option>
                        <option value="si">Sí, hay niños presentes</option>
                        <option value="duda">No estoy seguro/a</option>
                    </select>
                </div>
            </div>

            <div class="columna-der">
                <div class="campo">
                    <label>Indique el lugar (Toque el mapa):</label>
                    <div id="map"></div>
                    <button type="button" class="btn-gps" onclick="usarGPS()">Usar mi ubicación actual</button>
                    <input type="hidden" id="latitud" name="latitud">
                    <input type="hidden" id="longitud" name="longitud">
                    <input type="hidden" id="ip_remota" name="ip_remota">
                    <input type="hidden" id="perfil" name="perfil" value="senior">
                </div>

                <div class="campo">
                    <label for="descripcion">Descripción física (Indica aquí si tiene mascota o si puede acceder una ambulancia):</label>
                    <textarea id="descripcion" name="descripcion" rows="3" placeholder="Hombre/Mujer, unos ... años, ropa clara/oscura..."></textarea>
                </div>
            </div>
        </div>

        <div class="aviso-legal">
            <b>Información:</b> Se guarda la dirección de internet (IP) del aviso por seguridad. 
            Gracias por ayudar a quienes más lo necesitan.
        </div>

        <button type="submit" id="btn-enviar">ENVIAR AVISO A DYA</button>
    </form>

    <script>
        // Captura IP
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => { document.getElementById('ip_remota').value = data.ip; });

        // Mapa
        var map = L.map('map').setView([39.476, -6.372], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([39.476, -6.372], {draggable: true}).addTo(map);

        function actualizarCoordenadas(lat, lng) {
            document.getElementById('latitud').value = lat.toFixed(6);
            document.getElementById('longitud').value = lng.toFixed(6);
        }
        actualizarCoordenadas(39.476, -6.372);

        map.on('click', function(e) {
            marker.setLatLng(e.latlng);
            actualizarCoordenadas(e.latlng.lat, e.latlng.lng);
        });

        function usarGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(p) {
                    var lat = p.coords.latitude;
                    var lng = p.coords.longitude;
                    marker.setLatLng([lat, lng]);
                    map.setView([lat, lng], 17);
                    actualizarCoordenadas(lat, lng);
                });
            }
        }

        // Envío
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw8UMur6_6JcgYSQMtBndIjRYAFDVjbk2F7uO74pTKM2R6BdmTXR4-_BEb6ORuDb0t0/exec';
        const form = document.getElementById('formulario-dya');
        const btnEnviar = document.getElementById('btn-enviar');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btnEnviar.disabled = true;
            btnEnviar.innerText = "Enviando información...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors'})
                .then(() => {
                    alert("¡Gracias! Su aviso ha sido recibido correctamente.");
                    window.location.href = "index.html";
                })
                .catch(() => {
                    alert("Error al enviar. Inténtelo de nuevo.");
                    btnEnviar.disabled = false;
                });
        });
    </script>
</body>

</html>
